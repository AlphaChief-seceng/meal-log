<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Fuel Log">
<meta name="theme-color" content="#0f0f0f">
<title>Fuel Log</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --surface2: #242424;
    --border: #2e2e2e;
    --accent: #e8ff47;
    --accent2: #ff6b35;
    --text: #f0f0f0;
    --muted: #888;
    --protein-color: #4fc3f7;
    --cal-color: #ff6b35;
    --goal-protein: 175;
    --goal-calories: 2400;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    padding: 0 0 80px;
  }

  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 20px 24px 16px;
    position: sticky;
    top: 0;
    z-index: 100;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 12px;
  }

  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    letter-spacing: 2px;
    color: var(--accent);
    line-height: 1;
  }

  .date-badge {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .daily-totals {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    padding: 20px 16px 8px;
  }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    position: relative;
    overflow: hidden;
  }

  .stat-card::before {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 3px;
  }
  .stat-card.protein::before { background: var(--protein-color); }
  .stat-card.calories::before { background: var(--cal-color); }

  .stat-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--muted);
    font-weight: 600;
    margin-bottom: 6px;
  }

  .stat-value {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 40px;
    line-height: 1;
    letter-spacing: 1px;
  }
  .stat-card.protein .stat-value { color: var(--protein-color); }
  .stat-card.calories .stat-value { color: var(--cal-color); }

  .stat-unit {
    font-size: 13px;
    color: var(--muted);
    margin-top: 2px;
  }

  .progress-bar {
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    margin-top: 10px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    border-radius: 2px;
    transition: width 0.6s cubic-bezier(0.4,0,0.2,1);
  }
  .protein .progress-fill { background: var(--protein-color); }
  .calories .progress-fill { background: var(--cal-color); }

  .goal-text {
    font-size: 10px;
    color: var(--muted);
    margin-top: 5px;
    font-family: 'DM Mono', monospace;
  }

  /* Upload zone */
  .upload-section {
    padding: 16px;
  }

  .upload-zone {
    border: 2px dashed var(--border);
    border-radius: 16px;
    padding: 32px 20px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    background: var(--surface);
    position: relative;
  }

  .upload-zone:hover, .upload-zone.drag-over {
    border-color: var(--accent);
    background: #1e1e0f;
  }

  .upload-zone input[type=file] {
    position: absolute;
    inset: 0;
    opacity: 0;
    cursor: pointer;
    width: 100%;
    height: 100%;
  }

  .upload-icon {
    font-size: 36px;
    margin-bottom: 10px;
    display: block;
  }

  .upload-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    letter-spacing: 2px;
    color: var(--accent);
    margin-bottom: 4px;
  }

  .upload-sub {
    font-size: 12px;
    color: var(--muted);
  }

  /* Analyzing state */
  .analyzing-overlay {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    padding: 16px;
  }

  .analyzing-overlay.active { display: flex; }

  .preview-img {
    width: 100%;
    max-height: 220px;
    object-fit: cover;
    border-radius: 12px;
    border: 1px solid var(--border);
  }

  .spinner {
    width: 32px; height: 32px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .analyzing-text {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--accent);
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  /* Meals log */
  .meals-section {
    padding: 0 16px;
  }

  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }

  .section-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
  }

  .meal-count {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    background: var(--surface2);
    padding: 3px 8px;
    border-radius: 20px;
  }

  .meal-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    margin-bottom: 12px;
    overflow: hidden;
    animation: slideIn 0.3s ease;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .meal-card-inner {
    display: flex;
    gap: 12px;
    padding: 12px;
  }

  .meal-thumb {
    width: 80px;
    height: 80px;
    object-fit: cover;
    border-radius: 8px;
    flex-shrink: 0;
    border: 1px solid var(--border);
  }

  .meal-info {
    flex: 1;
    min-width: 0;
  }

  .meal-time {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 4px;
  }

  .meal-macros {
    display: flex;
    gap: 16px;
    margin-bottom: 8px;
  }

  .macro {
    display: flex;
    flex-direction: column;
  }

  .macro-val {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 1px;
    line-height: 1;
  }
  .macro-val.p { color: var(--protein-color); }
  .macro-val.c { color: var(--cal-color); }

  .macro-label {
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--muted);
    font-weight: 600;
  }

  .meal-items {
    font-size: 11px;
    color: var(--muted);
    line-height: 1.5;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .meal-delete {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    padding: 4px;
    font-size: 16px;
    align-self: flex-start;
    flex-shrink: 0;
    transition: color 0.2s;
  }
  .meal-delete:hover { color: #ff4444; }

  /* Summary button */
  .summary-btn {
    display: block;
    width: calc(100% - 32px);
    margin: 16px auto 0;
    background: var(--accent);
    color: #0f0f0f;
    border: none;
    border-radius: 12px;
    padding: 16px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    letter-spacing: 3px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .summary-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(232,255,71,0.25); }
  .summary-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  /* Summary panel */
  .summary-panel {
    display: none;
    margin: 0 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px;
    animation: slideIn 0.3s ease;
  }
  .summary-panel.active { display: block; }

  .summary-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 24px;
    letter-spacing: 3px;
    color: var(--accent);
    margin-bottom: 16px;
    text-align: center;
  }

  .summary-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
  }
  .summary-row:last-child { border-bottom: none; }

  .summary-row-label { font-size: 13px; color: var(--muted); }
  .summary-row-val {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 1px;
  }

  .status-badge {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-left: 8px;
  }
  .badge-good { background: #1a3a1a; color: #4caf50; }
  .badge-over { background: #3a1a1a; color: #ff4444; }
  .badge-low { background: #1a2a3a; color: #4fc3f7; }

  .empty-state {
    text-align: center;
    padding: 32px 16px;
    color: var(--muted);
  }
  .empty-icon { font-size: 40px; margin-bottom: 8px; }
  .empty-text { font-size: 13px; line-height: 1.6; }

  .reset-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    border-radius: 8px;
    padding: 8px 16px;
    font-size: 12px;
    cursor: pointer;
    margin-top: 12px;
    font-family: 'DM Sans', sans-serif;
    transition: all 0.2s;
    width: 100%;
  }
  .reset-btn:hover { border-color: #ff4444; color: #ff4444; }

  .divider {
    height: 1px;
    background: var(--border);
    margin: 16px 16px 16px;
  }

  .error-msg {
    background: #2a1a1a;
    border: 1px solid #ff4444;
    color: #ff6b6b;
    padding: 10px 14px;
    border-radius: 8px;
    font-size: 12px;
    margin: 0 16px 12px;
    display: none;
  }
  .error-msg.active { display: block; }
</style>
</head>
<body>

<header>
  <div>
    <div class="logo">FUEL LOG</div>
    <div class="date-badge" id="dateLabel"></div>
  </div>
  <div class="date-badge" style="text-align:right">
    GOAL<br>
    <span style="color:var(--protein-color)">175g protein</span>
  </div>
</header>

<!-- Daily Totals -->
<div class="daily-totals">
  <div class="stat-card protein">
    <div class="stat-label">Protein</div>
    <div class="stat-value" id="totalProtein">0</div>
    <div class="stat-unit">grams</div>
    <div class="progress-bar"><div class="progress-fill" id="proteinBar" style="width:0%"></div></div>
    <div class="goal-text" id="proteinGoalText">0 / 175g</div>
  </div>
  <div class="stat-card calories">
    <div class="stat-label">Calories</div>
    <div class="stat-value" id="totalCalories">0</div>
    <div class="stat-unit">kcal</div>
    <div class="progress-bar"><div class="progress-fill" id="caloriesBar" style="width:0%"></div></div>
    <div class="goal-text" id="caloriesGoalText">0 / 2400 kcal</div>
  </div>
</div>

<!-- Upload Zone -->
<div class="upload-section">
  <div class="upload-zone" id="uploadZone">
    <input type="file" accept="image/*" id="fileInput" capture="environment">
    <span class="upload-icon">📸</span>
    <div class="upload-title">LOG A MEAL</div>
    <div class="upload-sub">Tap to take a photo or upload from gallery</div>
  </div>

  <div class="analyzing-overlay" id="analyzingOverlay">
    <img id="previewImg" class="preview-img" src="" alt="meal preview">
    <div class="spinner"></div>
    <div class="analyzing-text">Analyzing your meal...</div>
  </div>
</div>

<div class="error-msg" id="errorMsg"></div>

<div class="divider"></div>

<!-- Meals Log -->
<div class="meals-section">
  <div class="section-header">
    <div class="section-title">Today's Meals</div>
    <div class="meal-count" id="mealCount">0 meals</div>
  </div>

  <div id="mealsList">
    <div class="empty-state" id="emptyState">
      <div class="empty-icon">🍽️</div>
      <div class="empty-text">No meals logged yet.<br>Upload a photo to get started.</div>
    </div>
  </div>
</div>

<!-- Summary -->
<button class="summary-btn" id="summaryBtn" onclick="toggleSummary()" disabled>
  VIEW DAY SUMMARY
</button>

<div class="summary-panel" id="summaryPanel">
  <div class="summary-title">📊 Day Summary</div>
  <div id="summaryContent"></div>
  <button class="reset-btn" onclick="resetDay()">🗑️ Reset & Start New Day</button>
</div>

<script>
  const GOAL_PROTEIN = 175;
  const GOAL_CALORIES = 2400;
  let meals = JSON.parse(localStorage.getItem('fuellog_meals') || '[]');
  let summaryVisible = false;

  // Filter to today only
  const todayKey = new Date().toDateString();
  meals = meals.filter(m => m.date === todayKey);
  saveMeals();

  // Set date
  document.getElementById('dateLabel').textContent = new Date().toLocaleDateString('en-US', {weekday:'short', month:'short', day:'numeric'});

  function saveMeals() {
    localStorage.setItem('fuellog_meals', JSON.stringify(meals));
  }

  function updateTotals() {
    const totalP = meals.reduce((s, m) => s + m.protein, 0);
    const totalC = meals.reduce((s, m) => s + m.calories, 0);
    document.getElementById('totalProtein').textContent = Math.round(totalP);
    document.getElementById('totalCalories').textContent = Math.round(totalC);
    document.getElementById('proteinBar').style.width = Math.min(100, (totalP / GOAL_PROTEIN) * 100) + '%';
    document.getElementById('caloriesBar').style.width = Math.min(100, (totalC / GOAL_CALORIES) * 100) + '%';
    document.getElementById('proteinGoalText').textContent = `${Math.round(totalP)} / ${GOAL_PROTEIN}g`;
    document.getElementById('caloriesGoalText').textContent = `${Math.round(totalC)} / ${GOAL_CALORIES} kcal`;
    document.getElementById('mealCount').textContent = `${meals.length} meal${meals.length !== 1 ? 's' : ''}`;
    document.getElementById('summaryBtn').disabled = meals.length === 0;
    document.getElementById('emptyState').style.display = meals.length === 0 ? 'block' : 'none';
  }

  function renderMeals() {
    const list = document.getElementById('mealsList');
    // Remove old cards
    list.querySelectorAll('.meal-card').forEach(c => c.remove());
    meals.forEach((meal, i) => {
      const card = document.createElement('div');
      card.className = 'meal-card';
      card.innerHTML = `
        <div class="meal-card-inner">
          <img class="meal-thumb" src="${meal.imageData}" alt="meal">
          <div class="meal-info">
            <div class="meal-time">${meal.time}</div>
            <div class="meal-macros">
              <div class="macro">
                <span class="macro-val p">${Math.round(meal.protein)}g</span>
                <span class="macro-label">Protein</span>
              </div>
              <div class="macro">
                <span class="macro-val c">${Math.round(meal.calories)}</span>
                <span class="macro-label">Kcal</span>
              </div>
            </div>
            <div class="meal-items">${meal.description}</div>
          </div>
          <button class="meal-delete" onclick="deleteMeal(${i})" title="Remove">✕</button>
        </div>`;
      list.appendChild(card);
    });
    updateTotals();
  }

  function deleteMeal(index) {
    meals.splice(index, 1);
    saveMeals();
    renderMeals();
    if (summaryVisible) buildSummary();
  }

  function toggleSummary() {
    summaryVisible = !summaryVisible;
    const panel = document.getElementById('summaryPanel');
    if (summaryVisible) {
      buildSummary();
      panel.classList.add('active');
      document.getElementById('summaryBtn').textContent = 'HIDE SUMMARY';
      panel.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    } else {
      panel.classList.remove('active');
      document.getElementById('summaryBtn').textContent = 'VIEW DAY SUMMARY';
    }
  }

  function buildSummary() {
    const totalP = meals.reduce((s, m) => s + m.protein, 0);
    const totalC = meals.reduce((s, m) => s + m.calories, 0);
    const proteinStatus = totalP >= GOAL_PROTEIN ? 'badge-good' : 'badge-low';
    const proteinLabel = totalP >= GOAL_PROTEIN ? '✓ Goal met' : `${Math.round(GOAL_PROTEIN - totalP)}g to go`;
    const calStatus = totalC > GOAL_CALORIES ? 'badge-over' : 'badge-good';
    const calLabel = totalC > GOAL_CALORIES ? `${Math.round(totalC - GOAL_CALORIES)} over` : `${Math.round(GOAL_CALORIES - totalC)} remaining`;

    let mealRows = meals.map(m => `
      <div class="summary-row">
        <span class="summary-row-label">${m.time}</span>
        <span style="font-size:12px; color:var(--muted)">
          <span style="color:var(--protein-color)">${Math.round(m.protein)}g</span> · 
          <span style="color:var(--cal-color)">${Math.round(m.calories)} kcal</span>
        </span>
      </div>`).join('');

    document.getElementById('summaryContent').innerHTML = `
      ${mealRows}
      <div class="summary-row" style="margin-top:8px">
        <span class="summary-row-label">Total Protein</span>
        <span class="summary-row-val" style="color:var(--protein-color)">
          ${Math.round(totalP)}g
          <span class="status-badge ${proteinStatus}">${proteinLabel}</span>
        </span>
      </div>
      <div class="summary-row">
        <span class="summary-row-label">Total Calories</span>
        <span class="summary-row-val" style="color:var(--cal-color)">
          ${Math.round(totalC)}
          <span class="status-badge ${calStatus}">${calLabel}</span>
        </span>
      </div>
      <div class="summary-row">
        <span class="summary-row-label">Meals Logged</span>
        <span class="summary-row-val" style="color:var(--text)">${meals.length}</span>
      </div>`;
  }

  function resetDay() {
    if (!confirm('Clear all meals for today?')) return;
    meals = [];
    saveMeals();
    summaryVisible = false;
    document.getElementById('summaryPanel').classList.remove('active');
    document.getElementById('summaryBtn').textContent = 'VIEW DAY SUMMARY';
    renderMeals();
  }

  // File input handling
  document.getElementById('fileInput').addEventListener('change', async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    await analyzeMeal(file);
    e.target.value = '';
  });

  // Drag and drop
  const zone = document.getElementById('uploadZone');
  zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('drag-over'); });
  zone.addEventListener('dragleave', () => zone.classList.remove('drag-over'));
  zone.addEventListener('drop', async e => {
    e.preventDefault();
    zone.classList.remove('drag-over');
    const file = e.dataTransfer.files[0];
    if (file && file.type.startsWith('image/')) await analyzeMeal(file);
  });

  async function analyzeMeal(file) {
    const errorEl = document.getElementById('errorMsg');
    errorEl.classList.remove('active');

    // Show preview
    const reader = new FileReader();
    reader.readAsDataURL(file);
    reader.onload = async () => {
      const imageData = reader.result;
      const base64 = imageData.split(',')[1];

      document.getElementById('uploadZone').style.display = 'none';
      const overlay = document.getElementById('analyzingOverlay');
      overlay.classList.add('active');
      document.getElementById('previewImg').src = imageData;

      try {
        const response = await fetch("https://api.anthropic.com/v1/messages", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            model: "claude-sonnet-4-20250514",
            max_tokens: 1000,
            messages: [{
              role: "user",
              content: [
                {
                  type: "image",
                  source: { type: "base64", media_type: file.type || "image/jpeg", data: base64 }
                },
                {
                  type: "text",
                  text: `Analyze this meal photo and respond ONLY with a JSON object, no markdown, no explanation. Format:
{
  "calories": <number, midpoint estimate>,
  "protein": <number in grams, midpoint estimate>,
  "description": "<comma-separated list of foods identified, keep it under 80 chars>"
}
Be practical and realistic with estimates. If no food is visible, use 0 for all values and description "No food detected".`
                }
              ]
            }]
          })
        });

        const data = await response.json();
        const text = data.content.map(i => i.text || '').join('');
        const clean = text.replace(/```json|```/g, '').trim();
        const parsed = JSON.parse(clean);

        const meal = {
          time: new Date().toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true }),
          calories: Math.round(parsed.calories || 0),
          protein: Math.round(parsed.protein || 0),
          description: parsed.description || 'Meal logged',
          imageData: imageData,
          date: new Date().toDateString()
        };

        meals.push(meal);
        saveMeals();
        renderMeals();

      } catch (err) {
        errorEl.textContent = 'Could not analyze the photo. Please try again.';
        errorEl.classList.add('active');
        console.error(err);
      } finally {
        overlay.classList.remove('active');
        document.getElementById('uploadZone').style.display = '';
      }
    };
  }

  // Init
  renderMeals();
</script>
</body>
</html>
